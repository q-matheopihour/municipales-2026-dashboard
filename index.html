<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MuniData — Municipales 2026 en direct</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }
        
        /* ============================================
           SPLASH SCREEN
        ============================================ */
        #splashScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            animation: fadeOut 0.5s ease-in-out 2.5s forwards;
        }
        
        @keyframes fadeOut {
            to {
                opacity: 0;
                visibility: hidden;
            }
        }
        
        .splash-logo {
            animation: scaleIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        @keyframes scaleIn {
            from {
                transform: scale(0);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }
        
        .splash-tagline {
            margin-top: 24px;
            font-size: 18px;
            color: white;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0;
            animation: fadeInUp 0.6s ease-out 0.5s forwards;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .splash-loader {
            margin-top: 40px;
            width: 60px;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            overflow: hidden;
            opacity: 0;
            animation: fadeIn 0.4s ease-out 1s forwards;
        }
        
        @keyframes fadeIn {
            to { opacity: 1; }
        }
        
        .splash-loader::after {
            content: '';
            display: block;
            width: 30px;
            height: 100%;
            background: white;
            border-radius: 2px;
            animation: loading 1.5s ease-in-out infinite;
        }
        
        @keyframes loading {
            0%, 100% { transform: translateX(-30px); }
            50% { transform: translateX(60px); }
        }
        
        /* ============================================
           MAIN CONTENT (caché pendant splash)
        ============================================ */
        #mainContent {
            opacity: 0;
            animation: fadeInContent 0.6s ease-out 3s forwards;
        }
        
        @keyframes fadeInContent {
            to { opacity: 1; }
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        /* ============================================
           HEADER avec LOGO
        ============================================ */
        .header {
            background: white;
            padding: 30px;
            border-radius: 16px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            animation: slideInDown 0.6s ease-out 3s both;
        }
        
        @keyframes slideInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .header-top {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 10px;
        }
        
        .header-logo {
            width: 48px;
            height: 48px;
        }
        
        .header h1 {
            font-size: 32px;
            color: #1a202c;
            margin: 0;
        }
        
        .header .meta {
            color: #718096;
            font-size: 14px;
            margin-left: 64px;
        }
        
        /* ============================================
           SUPERVISION CARD
        ============================================ */
        .supervision-card {
            background: white;
            padding: 24px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            animation: slideInDown 0.6s ease-out 3.1s both;
        }
        
        .supervision-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        
        .supervision-header h2 {
            font-size: 20px;
            color: #1a202c;
        }
        
        .last-update {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #4a5568;
        }
        
        .status-badge {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 13px;
        }
        
        .status-badge.updating {
            background: #fef3c7;
            color: #92400e;
            animation: pulse 2s ease-in-out infinite;
        }
        
        .status-badge.ready {
            background: #d1fae5;
            color: #065f46;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        
        .supervision-content {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }
        
        .supervision-stat {
            padding: 12px;
            background: #f7fafc;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        
        .supervision-stat-label {
            font-size: 12px;
            color: #718096;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }
        
        .supervision-stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #1a202c;
        }
        
        /* ============================================
           COMMUNE CARDS GRID
        ============================================ */
        .communes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 20px;
        }
        
        .commune-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
            opacity: 0;
            animation: slideInUp 0.5s ease-out forwards;
        }
        
        /* Décalage progressif des cartes */
        .commune-card:nth-child(1) { animation-delay: 3.2s; }
        .commune-card:nth-child(2) { animation-delay: 3.3s; }
        .commune-card:nth-child(3) { animation-delay: 3.4s; }
        .commune-card:nth-child(4) { animation-delay: 3.5s; }
        .commune-card:nth-child(5) { animation-delay: 3.6s; }
        .commune-card:nth-child(6) { animation-delay: 3.7s; }
        .commune-card:nth-child(7) { animation-delay: 3.8s; }
        .commune-card:nth-child(8) { animation-delay: 3.9s; }
        .commune-card:nth-child(9) { animation-delay: 4.0s; }
        .commune-card:nth-child(10) { animation-delay: 4.1s; }
        .commune-card:nth-child(11) { animation-delay: 4.2s; }
        .commune-card:nth-child(12) { animation-delay: 4.3s; }
        .commune-card:nth-child(13) { animation-delay: 4.4s; }
        .commune-card:nth-child(14) { animation-delay: 4.5s; }
        .commune-card:nth-child(15) { animation-delay: 4.6s; }
        .commune-card:nth-child(16) { animation-delay: 4.7s; }
        .commune-card:nth-child(17) { animation-delay: 4.8s; }
        .commune-card:nth-child(18) { animation-delay: 4.9s; }
        
        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .commune-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.15);
        }
        
        .commune-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }
        
        .commune-name {
            font-size: 22px;
            font-weight: 700;
            color: #1a202c;
            margin-bottom: 4px;
        }
        
        .commune-info {
            font-size: 13px;
            color: #718096;
        }
        
        .commune-status {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .commune-status.data-ok {
            background: #d1fae5;
            color: #065f46;
        }
        
        .commune-status.data-pending {
            background: #fee2e2;
            color: #991b1b;
        }
        
        .chart-container {
            margin: 20px 0;
            min-height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f7fafc;
            border-radius: 8px;
            position: relative;
            overflow: hidden;
        }
        
        .chart-placeholder {
            color: #a0aec0;
            font-size: 14px;
            text-align: center;
        }
        
        .chart-container iframe {
            border: none;
            width: 100%;
            min-height: 400px;
        }
        
        .commune-actions {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }
        
        .btn {
            flex: 1;
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-1px);
        }
        
        .btn-secondary {
            background: #edf2f7;
            color: #4a5568;
        }
        
        .btn-secondary:hover {
            background: #e2e8f0;
            transform: translateY(-1px);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        /* Modal sagouin */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal.show {
            display: flex;
            animation: fadeIn 0.2s ease;
        }
        
        .modal-content {
            background: white;
            padding: 32px;
            border-radius: 16px;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: scaleIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        .modal h2 {
            font-size: 24px;
            margin-bottom: 16px;
            color: #1a202c;
        }
        
        .modal p {
            color: #4a5568;
            margin-bottom: 24px;
            line-height: 1.6;
        }
        
        .modal-actions {
            display: flex;
            gap: 12px;
        }
        
        .modal-actions .btn {
            flex: 1;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .communes-grid {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 24px;
            }
            
            .supervision-content {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- SPLASH SCREEN -->
    <div id="splashScreen">
        <svg class="splash-logo" width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <!-- Logo MuniData -->
            <!-- Icône : graphique en barres stylisé -->
            <g>
                <!-- Barre 1 -->
                <rect x="40" y="100" width="25" height="60" fill="white" opacity="0.9" rx="4">
                    <animate attributeName="height" values="60;80;60" dur="1.5s" repeatCount="indefinite" begin="0s"/>
                    <animate attributeName="y" values="100;80;100" dur="1.5s" repeatCount="indefinite" begin="0s"/>
                </rect>
                <!-- Barre 2 -->
                <rect x="75" y="80" width="25" height="80" fill="white" opacity="0.9" rx="4">
                    <animate attributeName="height" values="80;100;80" dur="1.5s" repeatCount="indefinite" begin="0.3s"/>
                    <animate attributeName="y" values="80;60;80" dur="1.5s" repeatCount="indefinite" begin="0.3s"/>
                </rect>
                <!-- Barre 3 -->
                <rect x="110" y="70" width="25" height="90" fill="white" opacity="0.9" rx="4">
                    <animate attributeName="height" values="90;110;90" dur="1.5s" repeatCount="indefinite" begin="0.6s"/>
                    <animate attributeName="y" values="70;50;70" dur="1.5s" repeatCount="indefinite" begin="0.6s"/>
                </rect>
                <!-- Barre 4 -->
                <rect x="145" y="90" width="25" height="70" fill="white" opacity="0.9" rx="4">
                    <animate attributeName="height" values="70;90;70" dur="1.5s" repeatCount="indefinite" begin="0.9s"/>
                    <animate attributeName="y" values="90;70;90" dur="1.5s" repeatCount="indefinite" begin="0.9s"/>
                </rect>
            </g>
            
            <!-- Texte MuniData -->
            <text x="100" y="50" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="white" text-anchor="middle">
                MuniData
            </text>
        </svg>
        
        <div class="splash-tagline">Municipales 2026 en direct</div>
        <div class="splash-loader"></div>
    </div>

    <!-- MAIN CONTENT -->
    <div id="mainContent">
        <div class="container">
            <!-- HEADER -->
            <div class="header">
                <div class="header-top">
                    <!-- Mini logo -->
                    <svg class="header-logo" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                        <rect x="40" y="100" width="25" height="60" fill="#667eea" rx="4"/>
                        <rect x="75" y="80" width="25" height="80" fill="#667eea" rx="4"/>
                        <rect x="110" y="70" width="25" height="90" fill="#667eea" rx="4"/>
                        <rect x="145" y="90" width="25" height="70" fill="#667eea" rx="4"/>
                    </svg>
                    <h1>MuniData</h1>
                </div>
                <div class="meta">
                    Municipales 2026 — Résultats en direct · Second tour
                </div>
            </div>

            <!-- SUPERVISION -->
            <div class="supervision-card">
                <div class="supervision-header">
                    <h2>📊 Vue d'ensemble</h2>
                    <div class="last-update">
                        <span id="lastUpdateTime">Chargement...</span>
                        <span class="status-badge ready" id="globalStatus">Prêt</span>
                    </div>
                </div>
                <div class="supervision-content" id="supervisionStats">
                    <!-- Stats injectées par JS -->
                </div>
            </div>

            <!-- COMMUNES GRID -->
            <div class="communes-grid" id="communesGrid">
                <!-- Cartes injectées par JS -->
            </div>
        </div>
    </div>

    <!-- MODAL MISE À JOUR -->
    <div class="modal" id="updateModal">
        <div class="modal-content">
            <h2>🔄 Mise à jour en cours</h2>
            <p>De nouvelles données sont en train d'être intégrées. Les graphiques vont se mettre à jour automatiquement.</p>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal()">OK, compris</button>
                <button class="btn btn-primary" onclick="closeSagouin()">Ne plus afficher</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbzbaat2Wv42TtnimI7hGB6nZeLleNhuAa58I8mxHj412yjHhdsjApmzvdRqbSKIOM0MPA/exec';
        let previousData = null;
        let sagouinClicked = localStorage.getItem('sagouinClicked') === 'true';

        async function fetchData() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                // Détecter MAJ en cours
                const hasUpdating = data.communes.some(c => c.statut_graph === 'G-MAJ');
                
                if (hasUpdating && !sagouinClicked) {
                    document.getElementById('updateModal').classList.add('show');
                }
                
                displaySupervision(data);
                displayCommunes(data.communes);
                
                previousData = data;
            } catch (error) {
                console.error('Erreur fetch:', error);
            }
        }

        function displaySupervision(data) {
            const stats = [
                { label: 'Communes suivies', value: data.communes.length },
                { label: 'Données à jour', value: data.communes.filter(c => c.statut_data === 'D-OK').length },
                { label: 'Graphiques OK', value: data.communes.filter(c => c.statut_graph === 'G-OK' || c.statut_graph === 'G-MAJ').length }
            ];
            
            document.getElementById('supervisionStats').innerHTML = stats.map(s => `
                <div class="supervision-stat">
                    <div class="supervision-stat-label">${s.label}</div>
                    <div class="supervision-stat-value">${s.value}</div>
                </div>
            `).join('');
            
            document.getElementById('lastUpdateTime').textContent = `Dernière MAJ : ${new Date().toLocaleTimeString('fr-FR')}`;
        }

        function displayCommunes(communes) {
            const grid = document.getElementById('communesGrid');
            
            // Filtrer SUPERVISION
            const filtered = communes.filter(c => c.nom_onglet !== 'SUPERVISION');
            
            grid.innerHTML = filtered.map(commune => {
                const nomCommune = commune.nom_onglet
                    .replace(/_t2$/, '')
                    .replace(/_/g, ' ')
                    .replace(/\b\w/g, l => l.toUpperCase())
                    .replace(/Villeneuve D Ascq/, "Villeneuve-d'Ascq")
                    .replace(/Courcelles Les Lens/, 'Courcelles-lès-Lens')
                    .replace(/Faches Thumesnil/, 'Faches-Thumesnil');
                
                const hasChart = commune.statut_graph === 'G-OK' || commune.statut_graph === 'G-MAJ';
                const chartId = hasChart ? commune.embed_code?.match(/datawrapper-chart-([^"]+)/)?.[1] : null;
                
                return `
                    <div class="commune-card">
                        <div class="commune-header">
                            <div>
                                <div class="commune-name">${nomCommune}</div>
                                <div class="commune-info">
                                    ${commune.abstention ? `Abstention : ${commune.abstention}%` : ''}
                                    ${commune.depouillement ? ` · Dépouillement : ${commune.depouillement}%` : ''}
                                </div>
                            </div>
                            <span class="commune-status ${commune.statut_data === 'D-OK' ? 'data-ok' : 'data-pending'}">
                                ${commune.statut_data === 'D-OK' ? 'Données OK' : 'En attente'}
                            </span>
                        </div>
                        
                        <div class="chart-container">
                            ${hasChart && chartId ? 
                                `<iframe src="https://datawrapper.dwcdn.net/${chartId}/1/" scrolling="no" frameborder="0" style="width: 0; min-width: 100% !important; border: none;" height="400"></iframe>` :
                                `<div class="chart-placeholder">📊 Graphique en attente</div>`
                            }
                        </div>
                        
                        ${hasChart ? `
                            <div class="commune-actions">
                                <button class="btn btn-primary" onclick="copyLink('${commune.lien_graphique}')">
                                    🔗 Copier lien
                                </button>
                                <button class="btn btn-secondary" onclick="copyEmbed('${commune.embed_code?.replace(/'/g, "\\'")}')">
                                    📋 Copier embed
                                </button>
                                <button class="btn btn-secondary" onclick="window.open('${commune.lien_graphique}', '_blank')">
                                    📈 Ouvrir DW
                                </button>
                            </div>
                        ` : ''}
                    </div>
                `;
            }).join('');
        }

        function copyLink(link) {
            navigator.clipboard.writeText(link);
            alert('✓ Lien copié !');
        }

        function copyEmbed(code) {
            const decoded = code.replace(/\\'/g, "'");
            navigator.clipboard.writeText(decoded);
            alert('✓ Code embed copié !');
        }

        function closeModal() {
            document.getElementById('updateModal').classList.remove('show');
        }

        function closeSagouin() {
            sagouinClicked = true;
            localStorage.setItem('sagouinClicked', 'true');
            closeModal();
        }

        // Initial fetch et refresh toutes les 10s
        fetchData();
        setInterval(fetchData, 10000);
    </script>
</body>
</html>
